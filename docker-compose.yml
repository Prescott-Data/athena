version: '3.8'

services:
  memory-os:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      # Server Configuration
      - MEMORY_OS_PORT=8080
      - MEMORY_OS_GRPC_PORT=9090
      
      # Authentication
      - MEMORY_OS_API_KEY=${MEMORY_OS_API_KEY:-default-api-key}
      - MEMORY_OS_JWT_SECRET=${MEMORY_OS_JWT_SECRET:-your-secret-key}
      - MEMORY_OS_REQUIRE_API_KEY=true
      - MEMORY_OS_REQUIRE_JWT=true
      - MEMORY_OS_REQUIRE_MTLS=false
      
      # Memory Configuration
      - MEMORY_OS_STM_CACHE_MAX_TURNS=10
      - MEMORY_OS_STM_CACHE_TTL_HOURS=2
      - MEMORY_OS_MTM_QUALITY_MODE=balanced
      - MEMORY_OS_MTM_HEAT_THRESHOLD=0.8
      - MEMORY_OS_LTM_ENABLED=true
      
      # Database Configuration
      - MEMORY_OS_MONGODB_URI=${MEMORY_OS_MONGODB_URI:-mongodb://memory_user:memory_password_2024@172.190.152.215:27017/memory_os?retryWrites=true&authSource=memory_os}
      - MEMORY_OS_MONGODB_DATABASE=memory_os
      - MEMORY_OS_REDIS_HOST=${MEMORY_OS_REDIS_HOST:-172.190.152.215}
      - MEMORY_OS_REDIS_PORT=6379
      - MEMORY_OS_REDIS_PASSWORD=${MEMORY_OS_REDIS_PASSWORD:-dromos_redis_2024}
      - MEMORY_OS_MILVUS_HOST=${MEMORY_OS_MILVUS_HOST:-172.190.152.215}
      - MEMORY_OS_MILVUS_PORT=19530
      - MEMORY_OS_JANUS_HOST=${MEMORY_OS_JANUS_HOST:-172.190.152.215}
      - MEMORY_OS_JANUS_PORT=8182
      
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    depends_on:
      - redis
      - mongodb
      
  # Optional: Local Redis for development
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    profiles:
      - local
      
  # Optional: Local MongoDB for development  
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    volumes:
      - ./mongo-init:/docker-entrypoint-initdb.d
      - mongodb_data:/data/db
    profiles:
      - local

volumes:
  redis_data:
  mongodb_data:
