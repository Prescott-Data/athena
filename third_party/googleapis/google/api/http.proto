syntax = "proto3";

package google.api;

option go_package = "google.golang.org/genproto/googleapis/api/httpbody;httpbody";
option java_multiple_files = true;
option java_outer_classname = "HttpProto";
option java_package = "com.google.api";
option objc_class_prefix = "GAPI";

// Defines the HTTP configuration for a service. It contains a list of
// [HttpRule][google.api.HttpRule]s.
message Http {
  // A list of HTTP configuration rules that apply to individual API methods.
  //
  // **NOTE:** All service configuration rules follow "last one wins" order.
  repeated HttpRule rules = 1;

  // When set to true, URL path parameters will be fully URI-decoded except in
  // cases of single segment matches in reserved expansion, where "%2F" will be
  // left encoded.
  //
  // The default behavior is to not decode RFC 6570 reserved characters in multi
  // segment matches.
  bool fully_decode_reserved_expansion = 2;
}

// # gRPC Transcoding
//
// gRPC Transcoding is a feature for mapping between a gRPC method and one or
// more HTTP REST endpoints. It allows developers to build a single API service
// that supports both gRPC APIs and REST APIs. Many systems, including
// [Google APIs](https://github.com/googleapis/googleapis),
// [Cloud Endpoints](https://cloud.google.com/endpoints), [gRPC
// Gateway](https://github.com/grpc-ecosystem/grpc-gateway),
// and [Envoy](https://github.com/envoyproxy/envoy) proxy support this feature
// and use it for large scale production services.
//
// `HttpRule` defines the schema of the gRPC/REST mapping. The mapping specifies
// how different portions of the gRPC request message are mapped to the URL
// path, URL query parameters, and HTTP request body. It also controls how the
// gRPC response message is mapped to the HTTP response body. `HttpRule` is
// typically specified as an `google.api.http` annotation on the gRPC method.
//
// Each mapping specifies a URL path template and an HTTP method. The path
// template may refer to one or more fields in the gRPC request message, as
// long as each field is a non-repeated field with a primitive type.
//
// The path template drives the overall mapping. For example, here is a
// simple mapping for the `GetMessage` method:
//
//     service Messaging {
//       rpc GetMessage(GetMessageRequest) returns (Message) {
//         option (google.api.http) = {
//             get: "/v1/messages/{message_id}"
//         };
//       }
//     }
//
//     message GetMessageRequest {
//       string message_id = 1; // Mapped to URL path.
//     }
//
//     message Message {
//       string text = 1; // Mapped to response body.
//     }
//
// This mapping specifies that the `GetMessage` method can be invoked with an
// HTTP GET request for the path `/v1/messages/{message_id}`. The value of
// `message_id` field in the request message is mapped to the `{message_id}`
// portion of the URL path. This mapping is specified in the `get` field. All
// other fields in the request message are mapped to URL query parameters, and

// the response message is mapped to the HTTP response body.
//
// The `HttpRule` defines the schema of the gRPC/REST mapping. The mapping
// specifies how different portions of the gRPC request message are mapped to
// the URL path, URL query parameters, and HTTP request body. It also controls
// how the gRPC response message is mapped to the HTTP response body. `HttpRule`
// is typically specified as an `google.api.http` annotation on the gRPC method.
//
// Each mapping specifies a URL path template and an HTTP method. The path
// template may refer to one or more fields in the gRPC request message, as
// long as each field is a non-repeated field with a primitive type.
//
// The path template drives the overall mapping. For example, here is a
// simple mapping for the `GetMessage` method:
//
//     service Messaging {
//       rpc GetMessage(GetMessageRequest) returns (Message) {
//         option (google.api.http) = {
//             get: "/v1/messages/{message_id}"
//         };
//       }
//     }
//
//     message GetMessageRequest {
//       string message_id = 1; // Mapped to URL path.
//     }
//
//     message Message {
//       string text = 1; // Mapped to response body.
//     }
//
// This mapping specifies that the `GetMessage` method can be invoked with an
// HTTP GET request for the path `/v1/messages/{message_id}`. The value of
// `message_id` field in the request message is mapped to the `{message_id}`
// portion of the URL path. This mapping is specified in the `get` field. All
// other fields in the request message are mapped to URL query parameters, and
// the response message is mapped to the HTTP response body.
//
// This documentation provides a basic overview of HttpRule. Various terms are
// used such as "template", "pattern", "binding", and "parameters". For more
// information about the gRPC API transcoding, see this
// [document](https://cloud.google.com/endpoints/docs/grpc-service-config#service_bindings).
message HttpRule {
  // Selects a method to which this rule applies.
  //
  // Refer to [selector][google.api.DocumentationRule.selector] for syntax details.
  string selector = 1;

  // The name of the request field whose value is mapped to the HTTP body, or
  // `*` for mapping all request fields not captured by the path pattern to the
  // HTTP body. NOTE: the referred field must be present at the top-level of the
  // request message type.
  string body = 7;

  // The name of the response field whose value is mapped to the HTTP body. When
  // this is empty, the entire response message will be used as the HTTP body.
  //
  // NOTE: The referred field must be present at the top-level of the response
  // message type.
  string response_body = 12;

  // Specifies the HTTP method(s) to which this rule applies.
  oneof pattern {
    // Maps to HTTP GET. Used for listing and getting information about
    // resources.
    string get = 2;

    // Maps to HTTP PUT. Used for replacing a resource.
    string put = 3;

    // Maps to HTTP POST. Used for creating a resource or performing an action.
    string post = 4;

    // Maps to HTTP DELETE. Used for deleting a resource.
    string delete = 5;

    // Maps to HTTP PATCH. Used for updating a resource.
    string patch = 6;

    // The custom pattern is used for specifying custom HTTP verb that is not
    // covered by the standard verbs. This includes verbs like HEAD, TRACE,
    // OPTIONS.
    CustomHttpPattern custom = 8;
  }

  // Additional bindings that conform to the same API interface. Each binding
  // specifies a URL pattern and an HTTP method.
  repeated HttpRule additional_bindings = 11;
}

// A custom pattern is used for defining custom HTTP verb.
message CustomHttpPattern {
  // The name of this custom HTTP verb.
  string kind = 1;

  // The path matched by this custom verb.
  string path = 2;
}
