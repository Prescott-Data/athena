image: golang:1.24
definitions:
  caches:
    godeps: $GOPATH/pkg/mod
  services:
    docker:
      memory: 2048

pipelines:
  branches:
    # DEV BRANCH - Deploy to Azure Container Apps
    dev:
      - parallel:
          - step:
              name: "Lint Code"
              script:
                - go fmt ./...
                - go vet ./...
                - go mod tidy

          - step:
              name: "Run Tests"
              script:
                - echo "--- Running unit tests ---"
                - go test -v ./pkg/memoryos -timeout=5m
                - go test -v ./api/middleware -timeout=5m
                - echo "--- Unit tests completed successfully ---"
                - echo "--- Skipping E2E tests (require infrastructure) ---"
              after-script:
                - test $? -eq 0 && echo "Tests passed successfully!" || echo "Tests failed!"

      - step:
          name: "Build Binary"
          caches:
            - godeps
          script:
            - go mod download
            - go mod verify
            - CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o memory-server cmd/memory-server/main.go
          artifacts:
            - memory-server

      - step:
          name: Build and Push Docker Image
          image: mcr.microsoft.com/azure-cli
          size: 2x
          services:
            - docker
          caches:
            - docker
          script:
            - |
              # SCRIPT SETUP
              set -eo pipefail
              function on_error() {
                echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
                echo "!!! SCRIPT FAILED at line $1 !!!"
                echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
              }
              trap 'on_error $LINENO' ERR

              # VALIDATION
              echo "--- Validating environment variables ---"
              : "${AZURE_APP_ID:?AZURE_APP_ID is not set in Repository Variables.}"
              : "${AZURE_TENANT_ID:?AZURE_TENANT_ID is not set in Repository Variables.}"
              : "${AZURE_CLIENT_SECRET:?AZURE_CLIENT_SECRET is not set as a Secured Repository Variable.}"
              : "${BITBUCKET_COMMIT:?BITBUCKET_COMMIT is not set.}"
              echo "--- Variables validated successfully ---"

              # DEFINE LOCAL VARIABLES
              RESOURCE_GROUP="dromos"
              ACR_LOGIN_SERVER="dromos-cxe7ctfaaqaggqhb.azurecr.io"
              ACR_NAME="dromos"
              IMAGE_NAME="memory-os"
              IMAGE_TAG="$BITBUCKET_COMMIT"

              # EXECUTION
              echo "--- Attempting Azure login via Service Principal Secret ---"
              az login --service-principal -u "$AZURE_APP_ID" -p "$AZURE_CLIENT_SECRET" -t "$AZURE_TENANT_ID" --verbose
              echo "--- Azure login SUCCEEDED ---"

              echo "--- Attempting Azure Container Registry login ---"
              az acr login --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP" --verbose
              echo "--- ACR login SUCCEEDED ---"

              echo "--- Starting Docker build ---"
              docker build -t "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" .
              echo "--- Docker build SUCCEEDED ---"

              echo "--- Starting Docker push ---"
              docker push "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
              echo "--- Docker push SUCCEEDED ---"

      - step:
          name: Deploy to Azure Container App (Dev)
          deployment: development
          image: mcr.microsoft.com/azure-cli
          script:
            - |
              # SCRIPT SETUP
              set -eo pipefail
              function on_error() {
                echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
                echo "!!! SCRIPT FAILED at line $1 !!!"
                echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
              }
              trap 'on_error $LINENO' ERR

              # VALIDATION - Only Core Required Variables
              : "${AZURE_APP_ID:?AZURE_APP_ID is not set in Repository Variables.}"
              : "${AZURE_TENANT_ID:?AZURE_TENANT_ID is not set in Repository Variables.}"
              : "${AZURE_CLIENT_SECRET:?AZURE_CLIENT_SECRET is not set as a Secured Repository Variable.}"
              : "${BITBUCKET_COMMIT:?BITBUCKET_COMMIT is not set.}"
              : "${MONGO_URI:?MONGO_URI is not set in Repository Variables.}"
              : "${REDIS_HOST:?REDIS_HOST is not set in Repository Variables.}"

              # Set defaults for all optional variables
              export PORT="${PORT:-8080}"
              export REDIS_DB="${REDIS_DB:-0}"
              export REDIS_PASSWORD="${REDIS_PASSWORD:-}"
              export REDIS_POOL_SIZE="${REDIS_POOL_SIZE:-10}"
              export REDIS_POOL_TIMEOUT="${REDIS_POOL_TIMEOUT:-5s}"
              export CACHE_TTL="${CACHE_TTL:-3600}"
              export AZURE_OPENAI_ENDPOINT="${AZURE_OPENAI_ENDPOINT:-}"
              export AZURE_OPENAI_API_KEY="${AZURE_OPENAI_API_KEY:-}"
              export MILVUS_HOST="${MILVUS_HOST:-}"
              export MILVUS_DATABASE="${MILVUS_DATABASE:-}"
              export LLM_BASE_URL="${LLM_BASE_URL:-}"
              export LLM_MODEL_NAME="${LLM_MODEL_NAME:-gpt-4}"
              export LLM_API_VERSION="${LLM_API_VERSION:-2023-05-15}"
              export EMBEDDING_BASE_URL="${EMBEDDING_BASE_URL:-}"
              export EMBEDDING_MODEL_NAME="${EMBEDDING_MODEL_NAME:-text-embedding-ada-002}"
              export EMBEDDING_API_VERSION="${EMBEDDING_API_VERSION:-2023-05-15}"
              export EMBEDDING_DIMENSIONS="${EMBEDDING_DIMENSIONS:-1536}"
              export JANUS_ENDPOINT="${JANUS_ENDPOINT:-}"
              export STM_CACHE_MAX_TURNS="${STM_CACHE_MAX_TURNS:-20}"
              export STM_CACHE_KEY_PREFIX="${STM_CACHE_KEY_PREFIX:-stm}"
              export STM_CACHE_TTL="${STM_CACHE_TTL:-3600}"
              export STM_TASK_TIMEOUT="${STM_TASK_TIMEOUT:-300s}"
              export LLM_TIMEOUT_SECONDS="${LLM_TIMEOUT_SECONDS:-30}"
              export CHAIN_SIM_HIGH="${CHAIN_SIM_HIGH:-0.8}"
              export CHAIN_SIM_LOW="${CHAIN_SIM_LOW:-0.4}"
              export HEAT_ALPHA="${HEAT_ALPHA:-0.2}"
              export HEAT_BETA="${HEAT_BETA:-0.3}"
              export HEAT_GAMMA="${HEAT_GAMMA:-0.25}"
              export HEAT_DELTA="${HEAT_DELTA:-0.15}"
              export HEAT_EPSILON="${HEAT_EPSILON:-0.1}"
              export MEMORY_OS_MTM_QUALITY_MODE="${MEMORY_OS_MTM_QUALITY_MODE:-balanced}"
              export MEMORY_OS_MTM_HEAT_THRESHOLD="${MEMORY_OS_MTM_HEAT_THRESHOLD:-0.8}"
              export MEMORY_OS_MTM_MERGE_THRESHOLD="${MEMORY_OS_MTM_MERGE_THRESHOLD:-0.85}"
              export RUN_E2E_TESTS="${RUN_E2E_TESTS:-false}"
              export AI_AGENT_BASE_URL="${AI_AGENT_BASE_URL:-}"
              echo "--- Variables validated successfully ---"

              # DEFINE LOCAL VARIABLES
              RESOURCE_GROUP="dromos"
              CONTAINER_APP_NAME="memory-os"
              ACR_LOGIN_SERVER="dromos-cxe7ctfaaqaggqhb.azurecr.io"
              IMAGE_NAME="memory-os"
              IMAGE_TAG="$BITBUCKET_COMMIT"

              # EXECUTION
              echo "--- Attempting Azure login via Service Principal Secret for deployment step ---"
              az login --service-principal -u "$AZURE_APP_ID" -p "$AZURE_CLIENT_SECRET" -t "$AZURE_TENANT_ID" --verbose
              echo "--- Azure login SUCCEEDED ---"

              echo "--- Sending update command to Azure Container App: ${CONTAINER_APP_NAME} ---"
              az containerapp update --name "$CONTAINER_APP_NAME" --resource-group "$RESOURCE_GROUP" --image "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
                --set-env-vars \
                  PORT="$PORT" \
                  MONGO_URI="$MONGO_URI" \
                  MONGO_DB="memory_os" \
                  REDIS_HOST="$REDIS_HOST" \
                  REDIS_PORT="6379" \
                  REDIS_DB="$REDIS_DB" \
                  REDIS_PASSWORD="$REDIS_PASSWORD" \
                  REDIS_POOL_SIZE="$REDIS_POOL_SIZE" \
                  REDIS_POOL_TIMEOUT="$REDIS_POOL_TIMEOUT" \
                  CACHE_TTL="$CACHE_TTL" \
                  AZURE_OPENAI_ENDPOINT="$AZURE_OPENAI_ENDPOINT" \
                  AZURE_OPENAI_API_KEY="$AZURE_OPENAI_API_KEY" \
                  MILVUS_HOST="$MILVUS_HOST" \
                  MILVUS_PORT="19530" \
                  MILVUS_DATABASE="$MILVUS_DATABASE" \
                  LLM_BASE_URL="$LLM_BASE_URL" \
                  LLM_MODEL_NAME="$LLM_MODEL_NAME" \
                  LLM_API_VERSION="$LLM_API_VERSION" \
                  EMBEDDING_BASE_URL="$EMBEDDING_BASE_URL" \
                  EMBEDDING_MODEL_NAME="$EMBEDDING_MODEL_NAME" \
                  EMBEDDING_API_VERSION="$EMBEDDING_API_VERSION" \
                  EMBEDDING_DIMENSIONS="$EMBEDDING_DIMENSIONS" \
                  JANUS_ENDPOINT="$JANUS_ENDPOINT" \
                  STM_CACHE_MAX_TURNS="$STM_CACHE_MAX_TURNS" \
                  STM_CACHE_KEY_PREFIX="$STM_CACHE_KEY_PREFIX" \
                  STM_CACHE_TTL="$STM_CACHE_TTL" \
                  STM_TASK_TIMEOUT="$STM_TASK_TIMEOUT" \
                  LLM_TIMEOUT_SECONDS="$LLM_TIMEOUT_SECONDS" \
                  CHAIN_SIM_HIGH="$CHAIN_SIM_HIGH" \
                  CHAIN_SIM_LOW="$CHAIN_SIM_LOW" \
                  HEAT_ALPHA="$HEAT_ALPHA" \
                  HEAT_BETA="$HEAT_BETA" \
                  HEAT_GAMMA="$HEAT_GAMMA" \
                  HEAT_DELTA="$HEAT_DELTA" \
                  HEAT_EPSILON="$HEAT_EPSILON" \
                  MEMORY_OS_MTM_QUALITY_MODE="$MEMORY_OS_MTM_QUALITY_MODE" \
                  MEMORY_OS_MTM_HEAT_THRESHOLD="$MEMORY_OS_MTM_HEAT_THRESHOLD" \
                  MEMORY_OS_MTM_MERGE_THRESHOLD="$MEMORY_OS_MTM_MERGE_THRESHOLD" \
                  MEMORY_OS_MTM_MAX_SEGMENTS="$MEMORY_OS_MTM_MAX_SEGMENTS" \
                  RUN_E2E_TESTS="$RUN_E2E_TESTS" \
                  AI_AGENT_BASE_URL="$AI_AGENT_BASE_URL" \
                --verbose
              echo "--- Azure Container App update command SUCCEEDED ---"



    # STAGING BRANCH - Deploy to AKS Staging Cluster
    staging:
      - parallel:
          - step:
              name: "Lint Code"
              script:
                - go fmt ./...
                - go vet ./...
                - go mod tidy

          - step:
              name: "Run Tests"
              script:
                - echo "--- Running unit tests ---"
                - go test -v ./pkg/memoryos -timeout=5m
                - go test -v ./api/middleware -timeout=5m
                - echo "--- Unit tests completed successfully ---"
              after-script:
                - test $? -eq 0 && echo "Tests passed successfully!" || echo "Tests failed!"

      - step:
          name: "Build Binary"
          caches:
            - godeps
          script:
            - go mod download
            - go mod verify
            - CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o memory-server cmd/memory-server/main.go
          artifacts:
            - memory-server

      - step:
          name: Build and Push Docker Image
          image: mcr.microsoft.com/azure-cli
          size: 2x
          services:
            - docker
          caches:
            - docker
          script:
            - |
              set -eo pipefail
              trap 'echo "!!! SCRIPT FAILED at line $LINENO !!!"' ERR

              # VALIDATION
              : "${AZURE_APP_ID:?AZURE_APP_ID is not set}"
              : "${AZURE_TENANT_ID:?AZURE_TENANT_ID is not set}"
              : "${AZURE_CLIENT_SECRET:?AZURE_CLIENT_SECRET is not set}"
              : "${BITBUCKET_COMMIT:?BITBUCKET_COMMIT is not set}"

              # VARIABLES
              ACR_LOGIN_SERVER="dromos-cxe7ctfaaqaggqhb.azurecr.io"
              ACR_NAME="dromos"
              RESOURCE_GROUP="dromos"
              IMAGE_NAME="memory-os"
              IMAGE_TAG="$BITBUCKET_COMMIT"

              # Azure login and ACR login
              az login --service-principal -u "$AZURE_APP_ID" -p "$AZURE_CLIENT_SECRET" -t "$AZURE_TENANT_ID"
              az acr login --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP"

              # Build and push
              docker build -t "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" .
              docker push "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
              echo "--- Image pushed: ${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG} ---"

      - step:
          name: Deploy to AKS Staging
          deployment: staging
          image: mcr.microsoft.com/azure-cli
          script:
            - |
              set -eo pipefail
              trap 'echo "!!! SCRIPT FAILED at line $LINENO !!!"' ERR

              # VALIDATION
              : "${AZURE_APP_ID:?AZURE_APP_ID is not set}"
              : "${AZURE_TENANT_ID:?AZURE_TENANT_ID is not set}"
              : "${AZURE_CLIENT_SECRET:?AZURE_CLIENT_SECRET is not set}"
              : "${BITBUCKET_COMMIT:?BITBUCKET_COMMIT is not set}"

              # VARIABLES
              AKS_CLUSTER_NAME="dromos-console-aks-staging"
              AKS_RESOURCE_GROUP="dromos"
              ACR_LOGIN_SERVER="dromos-cxe7ctfaaqaggqhb.azurecr.io"
              IMAGE_NAME="memory-os"
              IMAGE_TAG="$BITBUCKET_COMMIT"
              NAMESPACE="dromos-memory-os"

              # Azure login
              az login --service-principal -u "$AZURE_APP_ID" -p "$AZURE_CLIENT_SECRET" -t "$AZURE_TENANT_ID"

              # Get AKS credentials
              echo "--- Getting AKS credentials for staging cluster ---"
              az aks get-credentials --resource-group "$AKS_RESOURCE_GROUP" --name "$AKS_CLUSTER_NAME" --overwrite-existing

              # Install kubectl if not available
              az aks install-cli 2>/dev/null || true

              # Update deployment image
              echo "--- Updating memory-os deployment image ---"
              kubectl set image deployment/memory-os \
                memory-os="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
                -n "$NAMESPACE"

              # Wait for rollout
              echo "--- Waiting for rollout to complete ---"
              kubectl rollout status deployment/memory-os -n "$NAMESPACE" --timeout=300s

              echo "--- Deployment to AKS Staging SUCCEEDED ---"

    # MAIN BRANCH - Deploy to AKS Production Cluster
    main:
      - parallel:
          - step:
              name: "Lint Code"
              script:
                - go fmt ./...
                - go vet ./...
                - go mod tidy

          - step:
              name: "Run Tests"
              script:
                - echo "--- Running unit tests ---"
                - go test -v ./pkg/memoryos -timeout=5m
                - go test -v ./api/middleware -timeout=5m
                - echo "--- Unit tests completed successfully ---"
              after-script:
                - test $? -eq 0 && echo "Tests passed successfully!" || echo "Tests failed!"

      - step:
          name: "Build Binary"
          caches:
            - godeps
          script:
            - go mod download
            - go mod verify
            - CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o memory-server cmd/memory-server/main.go
          artifacts:
            - memory-server

      - step:
          name: Build and Push Docker Image
          image: mcr.microsoft.com/azure-cli
          size: 2x
          services:
            - docker
          caches:
            - docker
          script:
            - |
              set -eo pipefail
              trap 'echo "!!! SCRIPT FAILED at line $LINENO !!!"' ERR

              # VALIDATION
              : "${AZURE_APP_ID:?AZURE_APP_ID is not set}"
              : "${AZURE_TENANT_ID:?AZURE_TENANT_ID is not set}"
              : "${AZURE_CLIENT_SECRET:?AZURE_CLIENT_SECRET is not set}"
              : "${BITBUCKET_COMMIT:?BITBUCKET_COMMIT is not set}"

              # VARIABLES
              ACR_LOGIN_SERVER="dromos-cxe7ctfaaqaggqhb.azurecr.io"
              ACR_NAME="dromos"
              RESOURCE_GROUP="dromos"
              IMAGE_NAME="memory-os"
              IMAGE_TAG="$BITBUCKET_COMMIT"

              # Azure login and ACR login
              az login --service-principal -u "$AZURE_APP_ID" -p "$AZURE_CLIENT_SECRET" -t "$AZURE_TENANT_ID"
              az acr login --name "$ACR_NAME" --resource-group "$RESOURCE_GROUP"

              # Build and push
              docker build -t "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" .
              docker push "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
              echo "--- Image pushed: ${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG} ---"

      - step:
          name: Deploy to AKS Production
          deployment: production
          image: mcr.microsoft.com/azure-cli
          script:
            - |
              set -eo pipefail
              trap 'echo "!!! SCRIPT FAILED at line $LINENO !!!"' ERR

              # VALIDATION
              : "${AZURE_APP_ID:?AZURE_APP_ID is not set}"
              : "${AZURE_TENANT_ID:?AZURE_TENANT_ID is not set}"
              : "${AZURE_CLIENT_SECRET:?AZURE_CLIENT_SECRET is not set}"
              : "${BITBUCKET_COMMIT:?BITBUCKET_COMMIT is not set}"

              # VARIABLES
              AKS_CLUSTER_NAME="dromos-console-aks-prod"
              AKS_RESOURCE_GROUP="dromos"
              ACR_LOGIN_SERVER="dromos-cxe7ctfaaqaggqhb.azurecr.io"
              IMAGE_NAME="memory-os"
              IMAGE_TAG="$BITBUCKET_COMMIT"
              NAMESPACE="dromos-memory-os"

              # Azure login
              az login --service-principal -u "$AZURE_APP_ID" -p "$AZURE_CLIENT_SECRET" -t "$AZURE_TENANT_ID"

              # Get AKS credentials
              echo "--- Getting AKS credentials for production cluster ---"
              az aks get-credentials --resource-group "$AKS_RESOURCE_GROUP" --name "$AKS_CLUSTER_NAME" --overwrite-existing

              # Install kubectl if not available
              az aks install-cli 2>/dev/null || true

              # Update deployment image
              echo "--- Updating memory-os deployment image ---"
              kubectl set image deployment/memory-os \
                memory-os="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
                -n "$NAMESPACE"

              # Wait for rollout
              echo "--- Waiting for rollout to complete ---"
              kubectl rollout status deployment/memory-os -n "$NAMESPACE" --timeout=300s

              echo "--- Deployment to AKS Production SUCCEEDED ---"

      - step:
          name: Mirror to GitHub
          image: alpine/git:latest
          script:
            # Install SSH client
            - apk add --no-cache openssh-client

            # Setup SSH directory
            - mkdir -p ~/.ssh

            # Decode the Base64 private key from the Workspace Variable
            - echo "$GITHUB_MIRROR_KEY" | base64 -d > ~/.ssh/id_ed25519
            - chmod 600 ~/.ssh/id_ed25519

            # Add GitHub to known hosts to prevent interactive prompt
            - ssh-keyscan github.com >> ~/.ssh/known_hosts

            # Push to the GitHub repo after successful production deploy
            - git push --mirror git@github.com:Prescott-Data/athena.git
