# Release workflow — creates a git tag and GitHub Release when a PR
# that changes the VERSION file is merged to main.
# It also builds and publishes the Docker image to GitHub Container Registry.
#
# HOW TO RELEASE:
#   1. Bump the version in the VERSION file on your feature branch
#   2. Merge the PR to main
#   3. This workflow automatically creates the tag, release, and docker image!
#
# This eliminates manual tagging entirely. The VERSION file is the
# single source of truth.

name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch: # Allows manual triggering if needed

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Version: ${VERSION} → Tag: v${VERSION}"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          CURRENT_SHA=$(git rev-parse HEAD)
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "refs/tags/${TAG}^{commit}")
            if [ "$TAG_SHA" = "$CURRENT_SHA" ]; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "✅ Tag ${TAG} already exists on this commit — skipping tag creation"
            else
              echo "::error::Tag ${TAG} exists but points to ${TAG_SHA}, not current commit ${CURRENT_SHA}. Delete the stale tag or bump VERSION."
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate release notes
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -xv "${{ steps.version.outputs.tag }}" | head -1)
          echo "Previous tag: ${PREV_TAG:-none}"

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi

          # Write to file to avoid escaping issues
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_notes.md
          generate_release_notes: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/memory-os
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
